<svg
  viewBox="0 0 640 180"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="In &amp; Out"
  role="img"
>
  <!-- ── "IN" ──────────────────────────────────────────────── -->
  <text
    x="4" y="152"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="140"
    letter-spacing="-4"
    fill="#111827"
  >IN</text>

  <!-- ── "OUT" ─────────────────────────────────────────────── -->
  <text
    x="348" y="152"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="140"
    letter-spacing="-4"
    fill="#111827"
  >OUT</text>

  <!-- ══════════════════════════════════════════════════════════
       RUNNING FIGURE — "&" glyph forms the torso/body
       ══════════════════════════════════════════════════════════ -->

  <!-- Torso: bold ampersand -->
  <text
    x="196" y="152"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="140"
    fill="#111827"
  >&amp;</text>

  <!-- Head (circle) -->
  <circle cx="270" cy="20" r="16" fill="#111827" />

  <!-- Cap crown -->
  <rect x="253" y="4"  width="34" height="13" rx="4" fill="#111827" />
  <!-- Cap brim -->
  <rect x="248" y="15" width="44" height="7"  rx="2" fill="#111827" />

  <!-- Right arm — drives forward to upper-right -->
  <line
    x1="286" y1="74"
    x2="318" y2="54"
    stroke="#111827"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Back leg — kicks rearward -->
  <line
    x1="232" y1="132"
    x2="205" y2="160"
    stroke="#111827"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Forward leg — stride ahead -->
  <line
    x1="268" y1="132"
    x2="294" y2="162"
    stroke="#111827"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- ══════════════════════════════════════════════════════════
       SPEED LINES — three horizontal dashes to the left
       ══════════════════════════════════════════════════════════ -->
  <line x1="168" y1="82"  x2="192" y2="82"  stroke="#111827" stroke-width="8"  stroke-linecap="round" />
  <line x1="160" y1="98"  x2="192" y2="98"  stroke="#111827" stroke-width="8"  stroke-linecap="round" />
  <line x1="168" y1="114" x2="192" y2="114" stroke="#111827" stroke-width="8"  stroke-linecap="round" />
</svg>
